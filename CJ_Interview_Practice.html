
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Blind Interview Mode</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;max-width:900px;margin:40px auto;padding:20px;text-align:center}
button{padding:14px 20px;margin:8px;font-size:18px}
#status{font-size:26px;margin:40px 0}
#question{display:none;font-size:30px;font-weight:700;line-height:1.5;margin:30px 0}
</style>
</head>
<body>
<h1>🎤 블라인드 면접 모드</h1>
<p>질문은 기본적으로 화면에 표시되지 않습니다.</p>

<div id="status">▶ 다음 질문을 눌러 시작하세요</div>
<div id="question"></div>

<button onclick="nextQ()">▶ 다음 질문</button>
<button onclick="speakCurrent()">🔊 다시 듣기</button>
<button onclick="toggleQuestion()">👁 질문 보기/숨기기</button>

<script>
const questions=[
"GA4 활용해 본 경험 있나요?",
"CRM 마케팅을 통해 성과를 개선해 본 경험이 있나요?",
"DTC가 무엇인지, CJ THE MARKET에서 왜 중요한지 설명해주세요.",
"지원동기",
"자기소개",
"실패 경험",
"갈등 사례",
"협업 경험",
"당신을 뽑아야하는 이유는?",
"마지막 할 말"
];

let pool=[...questions];
let current="";

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [a[i],a[j]]=[a[j],a[i]];
 }
}
shuffle(pool);

function speakCurrent(){
 if(!current) return;
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(current);
 u.lang='ko-KR';
 speechSynthesis.speak(u);
}

function nextQ(){
 if(pool.length===0){ pool=[...questions]; shuffle(pool); }
 current=pool.pop();
 document.getElementById("status").innerText="질문 재생 중...";
 document.getElementById("question").innerText=current;
 document.getElementById("question").style.display="none";
 setTimeout(speakCurrent,100);
}

function toggleQuestion(){
 const q=document.getElementById("question");
 q.style.display=(q.style.display==="none")?"block":"none";
}

document.addEventListener("keydown",e=>{
 if(e.code==="Space"){
   e.preventDefault();
   nextQ();
 }
});
</script>
</body>
</html>
